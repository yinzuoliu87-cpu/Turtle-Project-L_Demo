<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站位编辑器 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:18px;margin-bottom:8px;color:#58a6ff}
.controls{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
.controls button{padding:5px 12px;border:1px solid #58a6ff;background:rgba(88,166,255,.1);color:#58a6ff;border-radius:6px;cursor:pointer;font-size:12px}
.controls button:hover{background:rgba(88,166,255,.2)}
.controls select{padding:5px;background:#1a2a3a;color:#fff;border:1px solid #58a6ff;border-radius:6px;font-size:12px}
.preview-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.preview-box{position:relative;border:2px solid #333;border-radius:10px;overflow:hidden;background-size:cover;background-position:center;background-color:#0a1628}
.preview-box .label{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;color:#58a6ff;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:4px;z-index:20}
/* Dot sized to match the actual turtle footprint on the real battlefield
   (≈110px on a 1240px-wide scene = ~9% width). On a 500px preview that's
   ~45px. Semi-transparent so overlap is visually obvious. */
.dot{position:absolute;border-radius:50%;cursor:grab;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:10;user-select:none;transform:translateX(-50%);text-shadow:0 1px 2px rgba(0,0,0,.9)}
.dot:hover{z-index:20;box-shadow:0 0 12px rgba(255,255,255,.5)}
.dot.left-front{background:rgba(6,214,160,.55);border:2px solid #06d6a0;color:#fff}
.dot.left-back{background:rgba(6,214,160,.3);border:2px dashed #06d6a0;color:#fff}
.dot.right-front{background:rgba(199,125,255,.55);border:2px solid #c77dff;color:#fff}
.dot.right-back{background:rgba(199,125,255,.3);border:2px dashed #c77dff;color:#fff}
.output{width:100%;max-width:700px;background:#111;border:1px solid #333;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;white-space:pre;overflow-x:auto;color:#06d6a0;line-height:1.5}
.legend{display:flex;gap:14px;margin-bottom:6px;font-size:11px;flex-wrap:wrap;justify-content:center}
.legend span{display:flex;align-items:center;gap:3px}
.legend .sw{width:12px;height:12px;border-radius:50%}
.mirror-line{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(255,255,255,.15);z-index:5;pointer-events:none}
.info{font-size:11px;color:#666;margin-bottom:8px;text-align:center}
</style>
</head>
<body>

<h1>🐢 站位编辑器 v2（cover映射）</h1>

<div class="legend">
  <span><span class="sw" style="background:#06d6a0"></span>左前排</span>
  <span><span class="sw" style="background:rgba(6,214,160,.4)"></span>左后排</span>
  <span><span class="sw" style="background:#c77dff"></span>右前排</span>
  <span><span class="sw" style="background:rgba(199,125,255,.4)"></span>右后排</span>
</div>

<div class="info">拖动左边圆点调整位置，右边自动镜像。坐标基于16:9原始背景图，两个预览模拟实际裁剪效果。</div>

<div class="controls">
  <select id="bgSelect" onchange="changeBg()">
    <option value="assets/bg/bg-cave-alt.png">紫色洞穴 (DALL-E, 默认)</option>
    <option value="assets/bg/bg-cave.png">洞穴 (Boss)</option>
    <option value="assets/bg/bg-shipwreck.png">沉船 (PVP)</option>
    <option value="assets/bg/bg-ruins.png">夕阳废墟 (备选)</option>
    <option value="assets/bg/bg-underwater.png">海底龙宫 (备选)</option>
  </select>
  <button onclick="resetPos()">重置</button>
  <button onclick="copyOutput()">📋 复制代码</button>
</div>

<div class="preview-row">
  <div class="preview-box" id="previewDesktop">
    <div class="label">🖥 桌面端 16:9</div>
    <div class="mirror-line"></div>
  </div>
  <div class="preview-box" id="previewMobile">
    <div class="label">📱 移动端</div>
    <div class="mirror-line"></div>
  </div>
</div>

<div class="output" id="output"></div>

<script>
const SLOTS = ['front-0','front-1','front-2','back-0','back-1','back-2'];

// Per-bg defaults. Keyed by bg stem (matches ui.js BATTLE_POSITIONS_BY_BG).
// Bg that don't have their own entry fall back to bg-cave-alt.
const BG_DEFAULTS = {
  'bg-cave-alt': {
    desktop: {
      'front-0': { x: 43, y: 51 }, 'front-1': { x: 40, y: 68 }, 'front-2': { x: 37, y: 84 },
      'back-0':  { x: 33, y: 51 }, 'back-1':  { x: 25, y: 68 }, 'back-2':  { x: 17, y: 84 },
    },
    mobile: {
      'front-0': { x: 46, y: 47 }, 'front-1': { x: 45, y: 63 }, 'front-2': { x: 43, y: 82 },
      'back-0':  { x: 39, y: 47 }, 'back-1':  { x: 35, y: 63 }, 'back-2':  { x: 31, y: 82 },
    },
  },
};
function bgStem(path) {
  return (path || '').match(/([^\/]+?)(?:\.[^.]+)?$/)?.[1] || 'bg-cave-alt';
}
function getDefaultsFor(bg) {
  return BG_DEFAULTS[bgStem(bg)] || BG_DEFAULTS['bg-cave-alt'];
}

// `positions` holds the currently-edited set for the current bg.
let positions = JSON.parse(JSON.stringify(getDefaultsFor('bg-cave-alt')));

const desktopBox = document.getElementById('previewDesktop');
const mobileBox = document.getElementById('previewMobile');

// Same math as game's mapCoverPos
function mapCoverPos(imgX, imgY, cw, ch) {
  const imgRatio = 16 / 9;
  const cRatio = cw / ch;
  if (cRatio > imgRatio) {
    const visibleH = 1 / cRatio * imgRatio;
    const offsetY = (1 - visibleH) / 2;
    return { px: imgX / 100 * cw, py: (imgY / 100 - offsetY) / visibleH * ch };
  } else {
    const visibleW = cRatio / imgRatio;
    const offsetX = (1 - visibleW) / 2;
    return { px: (imgX / 100 - offsetX) / visibleW * cw, py: imgY / 100 * ch };
  }
}

function init() {
  // Desktop: 16:9
  const dw = Math.min(500, window.innerWidth / 2 - 30);
  desktopBox.style.width = dw + 'px';
  desktopBox.style.height = Math.round(dw * 9/16) + 'px';

  // Mobile preview: less extreme portrait (1.25 aspect, was 1.55) so more
  // of the 16:9 bg shows through before cover-cropping the sides.
  const mw = Math.min(240, window.innerWidth / 2 - 30);
  mobileBox.style.width = mw + 'px';
  mobileBox.style.height = Math.round(mw * 1.25) + 'px';

  changeBg();
  render();
}

function changeBg() {
  const bg = document.getElementById('bgSelect').value;
  desktopBox.style.backgroundImage = 'url(' + bg + ')';
  mobileBox.style.backgroundImage = 'url(' + bg + ')';
  // Swap positions to this bg's defaults (so different bgs have their
  // own tuned layouts — matches game's per-bg BATTLE_POSITIONS_BY_BG).
  positions = JSON.parse(JSON.stringify(getDefaultsFor(bg)));
  render();
}

function resetPos() {
  const bg = document.getElementById('bgSelect').value;
  positions = JSON.parse(JSON.stringify(getDefaultsFor(bg)));
  render();
}


function render() {
  // Clear old dots
  document.querySelectorAll('.dot').forEach(d => d.remove());

  // Render on both previews, each with its own position set.
  // Dot size = turtle's proportion of scene width.
  //   desktop: turtle 80×1.375=110 / scene ~1240 ≈ 8.9%
  //   mobile:  turtle 80×0.9=72   / scene ~450 ≈ 16% (phones are narrow)
  const configs = [[desktopBox, 'desktop', 0.089], [mobileBox, 'mobile', 0.16]];
  configs.forEach(([box, mode, ratio]) => {
    const cw = box.offsetWidth, ch = box.offsetHeight;
    const dotSize = Math.max(26, Math.round(cw * ratio));
    ['left','right'].forEach(side => {
      SLOTS.forEach(slot => {
        const p = positions[mode][slot];
        const row = slot.startsWith('front') ? 'front' : 'back';
        const idx = slot.split('-')[1];
        const label = (row === 'front' ? 'F' : 'B') + idx;
        const imgX = side === 'left' ? p.x : (100 - p.x);
        const imgY = p.y;
        const mapped = mapCoverPos(imgX, imgY, cw, ch);
        const leftPct = mapped.px / cw * 100;
        const bottomPct = (1 - mapped.py / ch) * 100;

        const el = document.createElement('div');
        el.className = 'dot ' + side + '-' + row;
        el.textContent = label;
        el.style.width = dotSize + 'px';
        el.style.height = dotSize + 'px';
        el.style.left = leftPct + '%';
        // Dot BOTTOM at Y — matches game: .scene-turtle also anchors its
        // bottom edge at the mapped Y (turtle's feet). If we centered the
        // dot on Y instead, the in-game turtle would sit a half-body HIGHER
        // than the dot position. Aligning bottoms keeps editor WYSIWYG.
        el.style.bottom = bottomPct + '%';
        el.style.top = 'auto';

        if (side === 'left') {
          el.addEventListener('mousedown', (e) => startDrag(e, slot, box, mode));
          el.addEventListener('touchstart', (e) => startDragTouch(e, slot, box, mode), {passive:false});
        } else {
          el.style.cursor = 'default';
        }

        box.appendChild(el);
      });
    });
  });

  updateOutput();
}

let dragging = null, dragBox = null, dragMode = null;
function startDrag(e, slot, box, mode) { e.preventDefault(); dragging = slot; dragBox = box; dragMode = mode; document.addEventListener('mousemove', onDrag); document.addEventListener('mouseup', stopDrag); }
function startDragTouch(e, slot, box, mode) { e.preventDefault(); dragging = slot; dragBox = box; dragMode = mode; document.addEventListener('touchmove', onDragT, {passive:false}); document.addEventListener('touchend', stopDrag); }
function onDrag(e) { if (!dragging) return; const r = dragBox.getBoundingClientRect(); doMove(e.clientX - r.left, e.clientY - r.top); }
function onDragT(e) { if (!dragging) return; e.preventDefault(); const t = e.touches[0]; const r = dragBox.getBoundingClientRect(); doMove(t.clientX - r.left, t.clientY - r.top); }

function doMove(px, py) {
  const cw = dragBox.offsetWidth, ch = dragBox.offsetHeight;
  // Reverse mapCoverPos: pixel → image coordinate
  const imgRatio = 16 / 9;
  const cRatio = cw / ch;
  let imgX, imgY;
  if (cRatio > imgRatio) {
    const visibleH = 1 / cRatio * imgRatio;
    const offsetY = (1 - visibleH) / 2;
    imgX = px / cw * 100;
    imgY = (py / ch * visibleH + offsetY) * 100;
  } else {
    const visibleW = cRatio / imgRatio;
    const offsetX = (1 - visibleW) / 2;
    imgX = (px / cw * visibleW + offsetX) * 100;
    imgY = py / ch * 100;
  }
  imgX = Math.round(Math.max(5, Math.min(48, imgX)));
  imgY = Math.round(Math.max(5, Math.min(95, imgY)));
  positions[dragMode][dragging] = { x: imgX, y: imgY };
  render();
}

function stopDrag() { dragging = null; dragBox = null; dragMode = null; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); document.removeEventListener('touchmove', onDragT); document.removeEventListener('touchend', stopDrag); }

function updateOutput() {
  let code = "const BATTLE_POSITIONS = {\n";
  ['desktop','mobile'].forEach(mode => {
    code += `  ${mode}: {\n`;
    SLOTS.forEach(s => {
      code += `    '${s}': { x: ${positions[mode][s].x}, y: ${positions[mode][s].y} },\n`;
    });
    code += `  },\n`;
  });
  code += "};";
  document.getElementById('output').textContent = code;
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => alert('已复制！'));
}

init();
</script>
</body>
</html>
