<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>龟龟对战 — 平衡模拟器</title>
<style>
:root{--bg:#0e1117;--bg2:#161b22;--bg3:#1c2333;--fg:#e6edf3;--fg2:#8b949e;--green:#06d6a0;--red:#ff6b6b;--accent:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);padding:20px;min-height:100vh}
h1{font-size:20px;margin-bottom:16px;color:var(--accent)}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:20px;padding:16px;background:var(--bg2);border-radius:10px}
label{font-size:13px;color:var(--fg2);display:flex;flex-direction:column;gap:4px}
select,input{background:var(--bg3);color:var(--fg);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;font-size:13px}
button{background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;margin:2px}
button:hover{filter:brightness(1.1)}
.progress{margin:10px 0;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .1s}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
th{text-align:left;padding:8px 10px;background:var(--bg2);color:var(--fg2);font-weight:600;border-bottom:1px solid rgba(255,255,255,.08)}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.win{color:var(--green);font-weight:700}.lose{color:var(--red)}
.bar{height:14px;border-radius:3px;display:inline-block;vertical-align:middle}
.bar-g{background:rgba(6,214,160,.5)}.bar-r{background:rgba(255,107,107,.5)}
.status{font-size:13px;color:var(--fg2);margin:8px 0}
</style>
</head>
<body>
<h1>龟龟对战 — 平衡模拟器 (全引擎)</h1>
<div class="controls">
  <label>左方龟1<select id="s0"></select></label>
  <label>左方龟2<select id="s1"></select></label>
  <span style="color:var(--fg2);padding:8px">VS</span>
  <label>右方龟1<select id="s2"></select></label>
  <label>右方龟2<select id="s3"></select></label>
  <label>次数<input type="number" id="simN" value="20" min="1" max="200"></label>
  <button id="btnCustom">自定义对战</button>
  <button id="btnMatrix">全对战矩阵</button>
</div>
<div class="progress"><div class="progress-fill" id="pf" style="width:0%"></div></div>
<div class="status" id="st">加载引擎中...</div>
<div id="res"></div>

<!--
  Step 1: Mock DOM elements that the engine expects
  These invisible divs prevent getElementById from returning null
-->
<div style="display:none">
  <div id="turnBanner"></div><div id="turnOrderBar"></div><div id="sideIndicator"></div>
  <div id="teamLabelLeft"></div><div id="teamLabelRight"></div>
  <div id="actionPanel"><div id="actingName"></div><div id="actionButtons"></div><div id="targetSelect" style="display:none"><div id="targetButtons"></div></div></div>
  <div id="battleLog"></div><div id="dmgStatsPanel"><div id="dmgStatsBody"></div></div>
  <div id="passivePopup" style="display:none"></div><div id="helpPanel" style="display:none"></div>
  <div id="toast"></div><div id="soundBtn"></div><div id="coinDisplay"></div><div id="recordStats"></div>
  <div id="screenMenu" class="screen"></div><div id="screenSelect" class="screen"></div>
  <div id="screenBattle" class="screen"></div><div id="screenResult" class="screen"></div>
  <div id="screenLobby" class="screen"></div><div id="screenDifficulty" class="screen"></div>
  <div id="selectTitle"></div><div id="petGrid"></div><div id="slot0"></div><div id="slot1"></div>
  <div id="btnConfirmTeam"></div><div id="joinRoomInput"></div><div id="roomCodeDisplay" style="display:none"></div>
  <div id="roomCodeText"></div><div id="lobbyStatus"></div>
  <div id="resultIcon"></div><div id="resultTitle"></div><div id="resultSub"></div>
  <div id="resultRewards"></div>
  <div id="leftFighter0"><div class="fighter-emoji"></div><div class="fighter-name"></div><div class="fighter-stats"></div><div class="hp-bar"><div class="hp-fill"></div></div><div class="hp-text"></div><div class="status-icons"></div></div>
  <div id="leftFighter1"><div class="fighter-emoji"></div><div class="fighter-name"></div><div class="fighter-stats"></div><div class="hp-bar"><div class="hp-fill"></div></div><div class="hp-text"></div><div class="status-icons"></div></div>
  <div id="rightFighter0"><div class="fighter-emoji"></div><div class="fighter-name"></div><div class="fighter-stats"></div><div class="hp-bar"><div class="hp-fill"></div></div><div class="hp-text"></div><div class="status-icons"></div></div>
  <div id="rightFighter1"><div class="fighter-emoji"></div><div class="fighter-name"></div><div class="fighter-stats"></div><div class="hp-bar"><div class="hp-fill"></div></div><div class="hp-text"></div><div class="status-icons"></div></div>
</div>

<!-- Load real engine -->
<script src="audio.js"></script>
<script src="js/pets.js"></script>
<script src="js/engine.js"></script>
<script src="js/skills.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

<script>
// Override sleep to instant
const _realSleep = sleep;
sleep = () => Promise.resolve();

// Override functions that show UI
const _np = ()=>{};
showScreen = _np; showToast = _np;

// ── SIM BATTLE ──────────────────────────────────────────
async function simBattle(leftIds, rightIds) {
  resetBattleState();
  gameMode = 'pve';
  leftTeam = leftIds.map(id => createFighter(id, 'left'));
  rightTeam = rightIds.map(id => createFighter(id, 'right'));
  allFighters = [...leftTeam, ...rightTeam];
  battleOver = false; turnNum = 1;
  batchPhase = 0; batchesThisRound = 0;

  // One-time passives
  allFighters.forEach(f => {
    if (!f.passive) return;
    if (f.passive.type === 'ninjaInstinct') {
      f.crit += f.passive.critBonus/100;
      f._extraCritDmgPerm = (f.passive.critDmgBonus||0)/100;
      f.armorPen += f.passive.armorPen||0;
    }
    if (f.passive.type === 'twoHeadVitality') {
      f.shield += Math.round(f.maxHp * f.passive.shieldPct/100);
      f._twoHeadHalfTriggered = false;
    }
  });

  const MAX_TURNS = 40;
  for (let turn = 0; turn < MAX_TURNS && !battleOver; turn++) {
    allFighters.forEach(f => f.skills.forEach(s => { if(s.cdLeft>0)s.cdLeft--; }));
    // Per-turn passives
    for (const f of allFighters) {
      if (!f.alive||!f.passive) continue;
      f.passiveUsedThisTurn = false;
      const p = f.passive;
      if (p.type==='turnScaleAtk'){f.baseAtk+=Math.round(f.baseAtk*p.pct/100);}
      if (p.type==='turnScaleHp'){const g=Math.round(f.maxHp*p.pct/100);f.maxHp+=g;f.hp+=g;}
      if (p.type==='stoneWall'){if(!f._stoneDefGained)f._stoneDefGained=0;if(f._stoneDefGained<p.maxDef){const g=Math.min(p.defGain,p.maxDef-f._stoneDefGained);f.baseDef+=g;f._stoneDefGained+=g;}}
      if (p.type==='cyberDrone'&&!f._isMech){if(!f._drones)f._drones=[];if(f._drones.length<p.maxDrones)f._drones.push({age:0});
        const en=allFighters.filter(e=>e.alive&&e.side!==f.side);
        for(let di=0;di<f._drones.length;di++){const al=en.filter(e=>e.alive);if(!al.length)break;const t=al[Math.floor(Math.random()*al.length)];
          const dmg=Math.round(f.atk*p.droneScale);const ed=Math.max(0,t.def-(f.armorPen||0));const dr=ed/(ed+DEF_CONSTANT);applyRawDmg(f,t,Math.max(1,Math.round(dmg*(1-dr))));}}
    }
    // Buffs
    for (const f of allFighters) { if(!f.alive)continue;
      f.buffs.filter(b=>b.type==='dot').forEach(d=>{f.hp=Math.max(0,f.hp-d.value);if(f.hp<=0){f.alive=false;f._deathProcessed=true;}});
      f.buffs.filter(b=>b.type==='phoenixBurnDot').forEach(pb=>{const d=pb.value+Math.round(f.maxHp*pb.hpPct/100);f.hp=Math.max(0,f.hp-d);if(f.hp<=0){f.alive=false;f._deathProcessed=true;}});
      f.buffs.filter(b=>b.type==='hot').forEach(h=>{f.hp=Math.min(f.maxHp,f.hp+h.value);});
      f.buffs.forEach(b=>b.turns--);f.buffs=f.buffs.filter(b=>b.turns>0);
    }
    recalcStats();
    if(!leftTeam.some(f=>f.alive)||!rightTeam.some(f=>f.alive))break;

    // Actions
    const la=leftTeam.filter(f=>f.alive),ra=rightTeam.filter(f=>f.alive);
    const order=turnNum===1?(la[0]?[la[0],...ra,...la.slice(1)]:[...ra]):(turnNum%2===0?[...ra,...la]:[...la,...ra]);

    for (const f of order) {
      if(!f||!f.alive||battleOver)continue;
      const enemies=allFighters.filter(e=>e.alive&&e.side!==f.side);
      if(!enemies.length){battleOver=true;break;}
      const ready=f.skills.filter(s=>s.cdLeft===0);if(!ready.length)continue;
      const allies=allFighters.filter(a=>a.alive&&a.side===f.side);
      const hs=ready.find(s=>s.type==='heal'),ss=ready.find(s=>s.type==='shield');
      const ds=ready.filter(s=>s.type!=='heal'&&s.type!=='shield'&&!s.switchTo);
      let skill;
      if(hs&&allies.some(a=>a.hp/a.maxHp<0.35))skill=hs;
      else if(ss&&allies.some(a=>a.shield<20))skill=ss;
      else skill=ds.length?ds[Math.floor(Math.random()*ds.length)]:ready[0];
      if(!skill)continue;if(skill.cd>0)skill.cdLeft=skill.cd;
      const target=enemies.sort((a,b)=>a.hp-b.hp)[0];

      try{
        animating=false;
        const savedNA=nextAction;nextAction=_np;
        await executeAction({attackerId:allFighters.indexOf(f),skillIdx:f.skills.indexOf(skill),targetId:allFighters.indexOf(target),aoe:!!skill.aoe});
        nextAction=savedNA;
      }catch(e){
        const h=skill.hits||1;for(let i=0;i<h;i++){if(!target.alive)break;
          let bp=skill.power||0;if(skill.atkScale)bp+=Math.round(f.atk*skill.atkScale);if(skill.hpPct)bp+=Math.round(target.maxHp*skill.hpPct/100);
          const ed=Math.max(0,target.def-(f.armorPen||0)),dr=ed/(ed+DEF_CONSTANT);applyRawDmg(f,target,Math.max(1,Math.round(bp*(1-dr))));
        }
      }
      // Deaths
      allFighters.forEach(ff=>{if(ff.hp<=0&&!ff._deathProcessed){
        if(ff.passive&&ff.passive.type==='phoenixRebirth'&&!ff._rebirthUsed){ff._rebirthUsed=true;ff.hp=Math.round(ff.maxHp*ff.passive.revivePct/100);ff.alive=true;return;}
        if(ff.passive&&ff.passive.type==='cyberDrone'&&ff._drones&&ff._drones.length>0&&!ff._isMech){const dc=ff._drones.length;ff._drones=[];ff._isMech=true;ff.hp=ff.passive.mechHpPer*dc;ff.maxHp=ff.hp;ff.baseAtk=ff.passive.mechAtkPer*dc;ff.atk=ff.baseAtk;ff.baseDef=0;ff.def=0;ff.alive=true;ff.buffs=[];ff.skills=[{name:'机甲攻击',type:'physical',hits:1,power:0,pierce:0,cd:0,atkScale:1.0}];return;}
        ff.alive=false;ff._deathProcessed=true;
      }});
      if(!leftTeam.some(ff=>ff.alive)||!rightTeam.some(ff=>ff.alive)){battleOver=true;break;}
    }
    turnNum++;
  }
  return{
    winner:leftTeam.some(f=>f.alive)?'left':rightTeam.some(f=>f.alive)?'right':'draw',
    left:leftTeam.map(f=>({id:f.id,name:f.name,dd:f._dmgDealt||0,dt:f._dmgTaken||0,alive:f.alive})),
    right:rightTeam.map(f=>({id:f.id,name:f.name,dd:f._dmgDealt||0,dt:f._dmgTaken||0,alive:f.alive})),
  };
}

// ── UI ──────────────────────────────────────────────────
function initSim() {
  ['s0','s1','s2','s3'].forEach(id=>{const sel=document.getElementById(id);
    ALL_PETS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=`${p.emoji}${p.name}(${p.rarity})`;sel.appendChild(o);});
  });
  document.getElementById('s0').value='hunter';document.getElementById('s1').value='stone';
  document.getElementById('s2').value='ninja';document.getElementById('s3').value='phoenix';
  document.getElementById('st').textContent='就绪';
  document.getElementById('btnCustom').onclick=runCustom;
  document.getElementById('btnMatrix').onclick=runMatrix;
}

async function runCustom(){
  const li=[document.getElementById('s0').value,document.getElementById('s1').value];
  const ri=[document.getElementById('s2').value,document.getElementById('s3').value];
  const N=parseInt(document.getElementById('simN').value)||20;
  document.getElementById('st').textContent='模拟中...';
  let lw=0,rw=0;const ps={};
  for(let i=0;i<N;i++){
    const r=await simBattle(li,ri);if(r.winner==='left')lw++;else if(r.winner==='right')rw++;
    [...r.left,...r.right].forEach(f=>{if(!ps[f.id])ps[f.id]={name:f.name,wins:0,games:0,dd:0,dt:0};
      ps[f.id].games++;ps[f.id].dd+=f.dd;ps[f.id].dt+=f.dt;if(f.alive)ps[f.id].wins++;});
    document.getElementById('pf').style.width=((i+1)/N*100)+'%';
    if(i%3===0)await new Promise(r=>requestAnimationFrame(r));
  }
  const ln=li.map(id=>ALL_PETS.find(p=>p.id===id)?.name).join('+');
  const rn=ri.map(id=>ALL_PETS.find(p=>p.id===id)?.name).join('+');
  let h=`<h3>${ln} vs ${rn} (${N}局)</h3><p>左方:<span class="${lw>=rw?'win':'lose'}">${Math.round(lw/N*100)}%</span>(${lw}胜) | 右方:<span class="${rw>=lw?'win':'lose'}">${Math.round(rw/N*100)}%</span>(${rw}胜)</p>`;
  h+='<table><tr><th>龟</th><th>存活率</th><th>造成均伤</th><th>承受均伤</th></tr>';
  Object.values(ps).sort((a,b)=>b.dd/b.games-a.dd/a.games).forEach(s=>{
    h+=`<tr><td>${s.name}</td><td class="${s.wins/s.games>=.5?'win':'lose'}">${Math.round(s.wins/s.games*100)}%</td><td>${Math.round(s.dd/s.games)}</td><td>${Math.round(s.dt/s.games)}</td></tr>`;
  });
  document.getElementById('res').innerHTML=h+'</table>';
  document.getElementById('st').textContent=`完成${N}局`;
}

async function runMatrix(){
  const ids=ALL_PETS.map(p=>p.id),N=Math.min(parseInt(document.getElementById('simN').value)||10,30);
  const st={};ids.forEach(id=>{st[id]={w:0,g:0,dd:0,dt:0};});
  const total=ids.length*(ids.length-1)/2;let done=0;
  document.getElementById('st').textContent='全矩阵模拟中...';
  for(let i=0;i<ids.length;i++){for(let j=i+1;j<ids.length;j++){let aw=0;
    for(let k=0;k<N;k++){const r=await simBattle([ids[i],ids[i]],[ids[j],ids[j]]);if(r.winner==='left')aw++;
      st[ids[i]].dd+=(r.left[0]?.dd||0)+(r.left[1]?.dd||0);st[ids[i]].dt+=(r.left[0]?.dt||0)+(r.left[1]?.dt||0);
      st[ids[j]].dd+=(r.right[0]?.dd||0)+(r.right[1]?.dd||0);st[ids[j]].dt+=(r.right[0]?.dt||0)+(r.right[1]?.dt||0);}
    st[ids[i]].w+=aw;st[ids[i]].g+=N;st[ids[j]].w+=(N-aw);st[ids[j]].g+=N;done++;
    if(done%3===0){document.getElementById('pf').style.width=(done/total*100)+'%';document.getElementById('st').textContent=`${done}/${total}`;await new Promise(r=>requestAnimationFrame(r));}
  }}
  document.getElementById('pf').style.width='100%';
  const sorted=Object.entries(st).map(([id,s])=>{const p=ALL_PETS.find(x=>x.id===id);
    return{name:p.name,emoji:p.emoji,rarity:p.rarity,wr:Math.round(s.w/s.g*100),w:s.w,g:s.g,ad:Math.round(s.dd/s.g),at:Math.round(s.dt/s.g)};}).sort((a,b)=>b.wr-a.wr);
  let h=`<h3>全龟排行(每对${N}局)</h3><table><tr><th>#</th><th>龟</th><th>稀有</th><th>胜率</th><th>胜/总</th><th>造成均伤</th><th>承受均伤</th><th></th></tr>`;
  sorted.forEach((s,i)=>{h+=`<tr><td>${i+1}</td><td>${s.emoji}${s.name}</td><td>${s.rarity}</td><td class="${s.wr>=50?'win':'lose'}">${s.wr}%</td><td>${s.w}/${s.g}</td><td>${s.ad}</td><td>${s.at}</td><td><div class="bar ${s.wr>=50?'bar-g':'bar-r'}" style="width:${s.wr}%">&nbsp;</div></td></tr>`;});
  document.getElementById('res').innerHTML=h+'</table>';
  document.getElementById('st').textContent=`完成${total}对`;
}

initSim();
</script>
</body>
</html>
