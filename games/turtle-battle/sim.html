<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>龟龟对战 — 平衡模拟器</title>
<style>
:root{--bg:#0e1117;--bg2:#161b22;--bg3:#1c2333;--fg:#e6edf3;--fg2:#8b949e;--green:#06d6a0;--red:#ff6b6b;--accent:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);padding:20px;min-height:100vh}
h1{font-size:20px;margin-bottom:16px;color:var(--accent)}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:20px;padding:16px;background:var(--bg2);border-radius:10px}
label{font-size:13px;color:var(--fg2);display:flex;flex-direction:column;gap:4px}
select,input{background:var(--bg3);color:var(--fg);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;font-size:13px}
button{background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
button:hover{filter:brightness(1.1);transform:translateY(-1px)}
button:disabled{opacity:.4;cursor:not-allowed}
.progress{margin:10px 0;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .1s}
.results{margin-top:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;background:var(--bg2);color:var(--fg2);font-weight:600;border-bottom:1px solid rgba(255,255,255,.08)}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.win{color:var(--green);font-weight:700}
.lose{color:var(--red)}
.bar-cell{position:relative}
.bar{height:16px;border-radius:3px;display:inline-block;vertical-align:middle}
.bar-green{background:rgba(6,214,160,.5)}
.bar-red{background:rgba(255,107,107,.5)}
.matchup-grid{display:grid;gap:2px;margin-top:20px;font-size:11px}
.matchup-cell{padding:4px;text-align:center;border-radius:3px;font-weight:600}
.status{font-size:13px;color:var(--fg2);margin:8px 0}
</style>
</head>
<body>
<h1>龟龟对战 — 平衡模拟器</h1>

<div class="controls">
  <label>左方龟1 <select id="left0"></select></label>
  <label>左方龟2 <select id="left1"></select></label>
  <label>VS</label>
  <label>右方龟1 <select id="right0"></select></label>
  <label>右方龟2 <select id="right1"></select></label>
  <label>模拟次数 <input type="number" id="simCount" value="50" min="1" max="500"></label>
  <button onclick="runSim()">开始模拟</button>
  <button onclick="runFullMatrix()">全对战矩阵</button>
</div>

<div class="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="status" id="status"></div>

<div class="results" id="results"></div>

<!-- Load game files (headless, no DOM rendering needed for sim) -->
<script src="js/pets.js"></script>
<script>
// ── HEADLESS BATTLE SIMULATOR ──────────────────────────────
// Minimal engine: no DOM, no animations, no audio, just math

function simCreateFighter(petId, side) {
  const b = ALL_PETS.find(p => p.id === petId);
  if (!b) return null;
  const m = RARITY_MULT[b.rarity] || 1;
  const hp = Math.round(b.hp * m);
  const atk = Math.round(b.atk * m);
  const def = Math.round(b.def * m);
  return {
    id:b.id, name:b.name, rarity:b.rarity, side,
    maxHp:hp, hp:hp, shield:0, baseAtk:atk, baseDef:def, atk, def,
    crit: b.crit || 0.25, armorPen:0, armorPenPct:0,
    alive:true, buffs:[], passive:b.passive||null,
    skills: b.skills.map(s => ({...s, cdLeft:0})),
    _dmgDealt:0, _dmgTaken:0,
    // Simplified: skip complex passives for speed
    _stoneDefGained:0, _drones:[], _isMech:false, _goldCoins:0,
    _lifestealPct:0, _rebirthUsed:false, _deathProcessed:false,
    bubbleStore:0, bubbleShieldVal:0, bubbleShieldTurns:0,
    _shockStacks:0, _twoHeadForm:'ranged', _summon:null,
  };
}

function simCalcDmg(attacker, target, skill) {
  let basePower = skill.power || 0;
  if (skill.atkScale) basePower += Math.round(attacker.atk * skill.atkScale);
  if (skill.defScale) basePower += Math.round(attacker.def * skill.defScale);
  if (skill.hpPct) basePower += Math.round(target.maxHp * skill.hpPct / 100);
  if (skill.random) basePower = Math.round(basePower * (0.5 + Math.random() * 1.5));

  const isCrit = Math.random() < attacker.crit;
  const critMult = isCrit ? 1.5 : 1;

  const eDef = Math.max(0, target.def * (1 - (attacker.armorPenPct||0)) - (attacker.armorPen||0));
  const defRed = eDef / (eDef + DEF_CONSTANT);

  const normalBase = Math.max(0, basePower - (skill.pierce||0));
  const normalDmg = Math.max(1, Math.round(normalBase * critMult * (1 - defRed)));
  const pierceDmg = Math.round((skill.pierce||0) * critMult);
  return normalDmg + pierceDmg;
}

function simApplyDmg(target, dmg) {
  let rem = dmg;
  if (target.shield > 0) { const a = Math.min(target.shield, rem); target.shield -= a; rem -= a; }
  target.hp = Math.max(0, target.hp - rem);
  if (target.hp <= 0) target.alive = false;
  return dmg;
}

function simRunBattle(leftIds, rightIds, maxTurns) {
  maxTurns = maxTurns || 30;
  const left = leftIds.map(id => simCreateFighter(id, 'left'));
  const right = rightIds.map(id => simCreateFighter(id, 'right'));
  const all = [...left, ...right];

  // Apply one-time passives
  all.forEach(f => {
    if (f.passive) {
      if (f.passive.type === 'ninjaInstinct') {
        f.crit += (f.passive.critBonus||0)/100;
        f.armorPen += f.passive.armorPen||0;
      }
      if (f.passive.type === 'twoHeadVitality') {
        f.shield += Math.round(f.maxHp * (f.passive.shieldPct||0) / 100);
      }
      if (f.passive.type === 'stoneWall') f._stoneDefGained = 0;
    }
  });

  let turnNum = 0;
  // Simplified turn: each fighter acts once per turn, alternating sides
  while (turnNum < maxTurns) {
    turnNum++;
    const lAlive = left.filter(f => f.alive);
    const rAlive = right.filter(f => f.alive);
    if (!lAlive.length || !rAlive.length) break;

    // Per-turn passives
    all.forEach(f => {
      if (!f.alive) return;
      if (f.passive && f.passive.type === 'turnScaleAtk') {
        f.baseAtk += Math.round(f.baseAtk * (f.passive.pct||0) / 100);
        f.atk = f.baseAtk;
      }
      if (f.passive && f.passive.type === 'turnScaleHp') {
        const gain = Math.round(f.maxHp * (f.passive.pct||0) / 100);
        f.maxHp += gain; f.hp += gain;
      }
      if (f.passive && f.passive.type === 'stoneWall' && f._stoneDefGained < (f.passive.maxDef||0)) {
        const gain = Math.min(f.passive.defGain||0, f.passive.maxDef - f._stoneDefGained);
        f.baseDef += gain; f.def = f.baseDef; f._stoneDefGained += gain;
      }
      // Reduce CDs
      f.skills.forEach(s => { if (s.cdLeft > 0) s.cdLeft--; });
    });

    // Action order: left first, then right (simplified)
    const order = [...lAlive, ...rAlive];
    for (const f of order) {
      if (!f.alive) continue;
      const enemies = (f.side === 'left' ? right : left).filter(e => e.alive);
      const allies = (f.side === 'left' ? left : right).filter(a => a.alive);
      if (!enemies.length) break;

      // Pick skill (simple AI)
      const ready = f.skills.filter(s => s.cdLeft === 0);
      if (!ready.length) continue;

      // Prefer damage skills
      const dmgSkills = ready.filter(s => s.type !== 'heal' && s.type !== 'shield' && !s.switchTo);
      const healSkills = ready.filter(s => s.type === 'heal' || s.type === 'shield');

      let skill;
      if (healSkills.length && allies.some(a => a.hp/a.maxHp < 0.3)) {
        skill = healSkills[0];
      } else {
        skill = dmgSkills.length ? dmgSkills[Math.floor(Math.random() * dmgSkills.length)] : ready[0];
      }

      if (skill.cd > 0) skill.cdLeft = skill.cd;

      // Execute
      const target = enemies.sort((a,b) => a.hp - b.hp)[0];
      const hits = skill.hits || 1;

      if (skill.type === 'heal') {
        const healTarget = allies.sort((a,b) => a.hp/a.maxHp - b.hp/b.maxHp)[0];
        if (skill.heal > 0) healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + skill.heal);
        if (skill.hot) healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + skill.hot.hpPerTurn);
      } else if (skill.type === 'shield') {
        let amt = skill.shield || 0;
        if (skill.shieldFlat) amt += skill.shieldFlat;
        if (skill.shieldHpPct) amt += Math.round(f.maxHp * skill.shieldHpPct / 100);
        const shieldTarget = allies.sort((a,b) => a.shield - b.shield)[0];
        shieldTarget.shield += amt;
      } else {
        // Damage
        const targets = skill.aoe ? enemies : [target];
        for (const t of targets) {
          if (!t.alive) continue;
          for (let h = 0; h < hits; h++) {
            if (!t.alive) break;
            const dmg = simCalcDmg(f, t, skill);
            simApplyDmg(t, dmg);
            f._dmgDealt += dmg;
            t._dmgTaken += dmg;
          }
        }
      }

      // Check deaths
      if (!left.some(f => f.alive) || !right.some(f => f.alive)) break;
    }
    if (!left.some(f => f.alive) || !right.some(f => f.alive)) break;
  }

  const leftWon = left.some(f => f.alive);
  const rightWon = right.some(f => f.alive);
  return {
    winner: leftWon ? 'left' : rightWon ? 'right' : 'draw',
    turns: turnNum,
    left: left.map(f => ({ id:f.id, name:f.name, dmgDealt:f._dmgDealt, dmgTaken:f._dmgTaken, alive:f.alive, hpLeft:f.hp })),
    right: right.map(f => ({ id:f.id, name:f.name, dmgDealt:f._dmgDealt, dmgTaken:f._dmgTaken, alive:f.alive, hpLeft:f.hp })),
  };
}

// ── UI ──────────────────────────────────────────────────────
function init() {
  const selects = ['left0','left1','right0','right1'];
  selects.forEach(id => {
    const sel = document.getElementById(id);
    ALL_PETS.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.emoji} ${p.name} (${p.rarity})`;
      sel.appendChild(opt);
    });
  });
  // Defaults
  document.getElementById('left0').value = 'hunter';
  document.getElementById('left1').value = 'stone';
  document.getElementById('right0').value = 'ninja';
  document.getElementById('right1').value = 'phoenix';
}

async function runSim() {
  const leftIds = [document.getElementById('left0').value, document.getElementById('left1').value];
  const rightIds = [document.getElementById('right0').value, document.getElementById('right1').value];
  const count = parseInt(document.getElementById('simCount').value) || 50;

  document.getElementById('status').textContent = '模拟中...';
  document.getElementById('progressFill').style.width = '0%';

  await sleep(10);

  let leftWins = 0, rightWins = 0, draws = 0;
  const petStats = {};

  for (let i = 0; i < count; i++) {
    const result = simRunBattle(leftIds, rightIds);
    if (result.winner === 'left') leftWins++;
    else if (result.winner === 'right') rightWins++;
    else draws++;

    // Accumulate per-pet stats
    [...result.left, ...result.right].forEach(f => {
      if (!petStats[f.id]) petStats[f.id] = { name:f.name, wins:0, games:0, totalDmgDealt:0, totalDmgTaken:0 };
      petStats[f.id].games++;
      petStats[f.id].totalDmgDealt += f.dmgDealt;
      petStats[f.id].totalDmgTaken += f.dmgTaken;
      if (f.alive) petStats[f.id].wins++;
    });

    if (i % 5 === 0) {
      document.getElementById('progressFill').style.width = (i/count*100) + '%';
      await sleep(0);
    }
  }

  document.getElementById('progressFill').style.width = '100%';

  const leftNames = leftIds.map(id => ALL_PETS.find(p=>p.id===id)?.name).join('+');
  const rightNames = rightIds.map(id => ALL_PETS.find(p=>p.id===id)?.name).join('+');
  const leftRate = Math.round(leftWins/count*100);
  const rightRate = Math.round(rightWins/count*100);

  let html = `<h3>${leftNames} vs ${rightNames} (${count}局)</h3>`;
  html += `<p>左方胜率: <span class="${leftRate>=50?'win':'lose'}">${leftRate}%</span> (${leftWins}胜) | 右方胜率: <span class="${rightRate>=50?'win':'lose'}">${rightRate}%</span> (${rightWins}胜) | 平局: ${draws}</p>`;

  html += '<table><tr><th>龟</th><th>存活率</th><th>均伤(造成)</th><th>均伤(承受)</th><th>伤害比</th></tr>';
  Object.values(petStats).sort((a,b) => b.totalDmgDealt/b.games - a.totalDmgDealt/a.games).forEach(s => {
    const survRate = Math.round(s.wins/s.games*100);
    const avgDealt = Math.round(s.totalDmgDealt/s.games);
    const avgTaken = Math.round(s.totalDmgTaken/s.games);
    const ratio = avgTaken > 0 ? (avgDealt/avgTaken).toFixed(2) : '∞';
    html += `<tr><td>${s.name}</td><td class="${survRate>=50?'win':'lose'}">${survRate}%</td><td>${avgDealt}</td><td>${avgTaken}</td><td>${ratio}</td></tr>`;
  });
  html += '</table>';

  document.getElementById('results').innerHTML = html;
  document.getElementById('status').textContent = `完成 ${count} 局模拟`;
}

async function runFullMatrix() {
  const count = parseInt(document.getElementById('simCount').value) || 20;
  const pets = ALL_PETS.map(p => p.id);
  const results = {};
  const total = pets.length * (pets.length - 1) / 2;
  let done = 0;

  document.getElementById('status').textContent = '全矩阵模拟中...';

  // Single turtle vs single turtle (1v1)
  for (let i = 0; i < pets.length; i++) {
    results[pets[i]] = { wins:0, games:0, totalDmg:0, totalTaken:0 };
    for (let j = i+1; j < pets.length; j++) {
      if (!results[pets[j]]) results[pets[j]] = { wins:0, games:0, totalDmg:0, totalTaken:0 };

      let aWins = 0;
      for (let k = 0; k < count; k++) {
        const r = simRunBattle([pets[i], pets[i]], [pets[j], pets[j]]);
        if (r.winner === 'left') aWins++;
        results[pets[i]].totalDmg += r.left[0].dmgDealt + r.left[1].dmgDealt;
        results[pets[i]].totalTaken += r.left[0].dmgTaken + r.left[1].dmgTaken;
        results[pets[j]].totalDmg += r.right[0].dmgDealt + r.right[1].dmgDealt;
        results[pets[j]].totalTaken += r.right[0].dmgTaken + r.right[1].dmgTaken;
      }
      results[pets[i]].games += count;
      results[pets[j]].games += count;
      results[pets[i]].wins += aWins;
      results[pets[j]].wins += (count - aWins);

      done++;
      if (done % 10 === 0) {
        document.getElementById('progressFill').style.width = (done/total*100) + '%';
        document.getElementById('status').textContent = `全矩阵模拟中... ${done}/${total}`;
        await sleep(0);
      }
    }
  }

  document.getElementById('progressFill').style.width = '100%';

  // Sort by win rate
  const sorted = Object.entries(results).map(([id, s]) => ({
    id, name: ALL_PETS.find(p=>p.id===id)?.name || id,
    rarity: ALL_PETS.find(p=>p.id===id)?.rarity || '?',
    emoji: ALL_PETS.find(p=>p.id===id)?.emoji || '',
    winRate: s.games > 0 ? s.wins/s.games : 0,
    wins: s.wins, games: s.games,
    avgDmg: s.games > 0 ? Math.round(s.totalDmg / s.games) : 0,
    avgTaken: s.games > 0 ? Math.round(s.totalTaken / s.games) : 0,
  })).sort((a,b) => b.winRate - a.winRate);

  let html = `<h3>全龟胜率排行 (每对${count}局)</h3>`;
  html += '<table><tr><th>#</th><th>龟</th><th>稀有度</th><th>胜率</th><th>胜/总</th><th>造成均伤</th><th>承受均伤</th><th>胜率条</th></tr>';
  sorted.forEach((s, i) => {
    const rate = Math.round(s.winRate * 100);
    const barW = rate;
    html += `<tr>
      <td>${i+1}</td>
      <td>${s.emoji} ${s.name}</td>
      <td>${s.rarity}</td>
      <td class="${rate>=50?'win':'lose'}">${rate}%</td>
      <td>${s.wins}/${s.games}</td>
      <td>${s.avgDmg}</td>
      <td>${s.avgTaken}</td>
      <td class="bar-cell"><div class="bar ${rate>=50?'bar-green':'bar-red'}" style="width:${barW}%">&nbsp;</div></td>
    </tr>`;
  });
  html += '</table>';

  document.getElementById('results').innerHTML = html;
  document.getElementById('status').textContent = `完成全矩阵 ${total} 对组合`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

init();
</script>
</body>
</html>
