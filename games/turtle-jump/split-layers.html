<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>背景分层切割工具</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: sans-serif; padding: 20px; }
  h2 { color: #4cc9f0; margin: 0 0 8px; }
  canvas { display: block; image-rendering: pixelated; }
  .section { margin: 20px 0; padding: 16px; background: #16213e; border-radius: 8px; }
  button { background: #4cc9f0; color: #111; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; margin: 4px; }
  button:hover { background: #3ab0d8; }
  .info { color: #888; font-size: 13px; margin: 4px 0; }
  .cut-area { position: relative; display: inline-block; }
  .cut-line { position: absolute; left: 0; width: 100%; height: 3px; background: #ff4444; cursor: ns-resize; z-index: 10; }
  .cut-line::after { content: attr(data-label); position: absolute; right: 8px; top: -18px; background: #ff4444; color: #fff; font-size: 12px; padding: 1px 6px; border-radius: 3px; white-space: nowrap; }
  .cut-line.green { background: #44ff88; }
  .cut-line.green::after { background: #44ff88; color: #111; }
  .cut-line.blue { background: #4488ff; }
  .cut-line.blue::after { background: #4488ff; }
  .cut-line.yellow { background: #ffcc44; }
  .cut-line.yellow::after { background: #ffcc44; color: #111; }
  .layers-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .layer-box { flex: 1; min-width: 280px; }
  .layer-box canvas { border: 1px solid #333; width: 100%; }
  #instructions { background: #0f3460; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; line-height: 1.6; }
</style>
</head>
<body>
<h1>背景分层切割工具</h1>

<div id="instructions">
  <b>使用方法：</b>拖动原图上的 <span style="color:#ff4444">红</span>/<span style="color:#44ff88">绿</span>/<span style="color:#4488ff">蓝</span>/<span style="color:#ffcc44">黄</span> 分割线调整每层的范围，然后点击下载按钮保存 PNG。<br>
  底部合成预览可以鼠标左右滑动查看视差效果。
</div>

<div id="status">加载图片中...</div>

<div class="section">
  <h2>原图 — 拖动分割线调整</h2>
  <div class="cut-area" id="cutArea">
    <canvas id="original"></canvas>
    <!-- 4 draggable lines: layer1 bottom, layer2 top, layer2 bottom, layer3 top -->
    <div class="cut-line" id="line0" data-label="远景层 起点" style="top:0px"></div>
    <div class="cut-line green" id="line1" data-label="远景层 终点 / 中景层 起点" style="top:100px"></div>
    <div class="cut-line blue" id="line2" data-label="中景层 终点 / 近景层 起点" style="top:200px"></div>
    <div class="cut-line yellow" id="line3" data-label="近景层 终点" style="top:300px"></div>
  </div>
</div>

<div class="section">
  <h2>分层预览 — 确认后下载</h2>
  <div class="layers-row">
    <div class="layer-box">
      <h2>Layer 1 远景</h2>
      <p class="info">视差最慢 · 洞顶/远山</p>
      <canvas id="layer1"></canvas>
      <button onclick="download('layer1','bg-layer-far.png')">下载 bg-layer-far.png</button>
    </div>
    <div class="layer-box">
      <h2>Layer 2 中景</h2>
      <p class="info">中等视差 · 山脉</p>
      <canvas id="layer2"></canvas>
      <button onclick="download('layer2','bg-layer-mid.png')">下载 bg-layer-mid.png</button>
    </div>
    <div class="layer-box">
      <h2>Layer 3 近景</h2>
      <p class="info">视差最快 · 海底</p>
      <canvas id="layer3"></canvas>
      <button onclick="download('layer3','bg-layer-near.png')">下载 bg-layer-near.png</button>
    </div>
  </div>
</div>

<div class="section">
  <h2>合成预览（鼠标左右移动模拟视差）</h2>
  <canvas id="composite" width="896" height="512" style="border:1px solid #333;width:896px;height:512px;"></canvas>
</div>

<script>
const img = new Image();
img.src = 'Pixel scene.png';

// Display scale: original → preview
let scale = 1;
let imgW = 0, imgH = 0;

// Cut positions in ORIGINAL image pixels (y coordinates)
// line0 = layer1 top, line1 = layer1 bottom / layer2 top
// line2 = layer2 bottom / layer3 top, line3 = layer3 bottom
let cuts = [0, 300, 580, 1024];

const lines = [
  document.getElementById('line0'),
  document.getElementById('line1'),
  document.getElementById('line2'),
  document.getElementById('line3'),
];

img.onload = function() {
  imgW = img.width;
  imgH = img.height;

  // Scale to fit ~900px wide
  const displayW = Math.min(900, window.innerWidth - 80);
  scale = displayW / imgW;

  const origCanvas = document.getElementById('original');
  origCanvas.width = imgW;
  origCanvas.height = imgH;
  origCanvas.style.width = Math.floor(imgW * scale) + 'px';
  origCanvas.style.height = Math.floor(imgH * scale) + 'px';

  const ctx = origCanvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Set cut area size
  const cutArea = document.getElementById('cutArea');
  cutArea.style.width = origCanvas.style.width;
  cutArea.style.height = origCanvas.style.height;

  // Default cuts based on image analysis
  cuts = [0, Math.floor(imgH * 0.30), Math.floor(imgH * 0.56), imgH];

  document.getElementById('status').textContent =
    '图片: ' + imgW + 'x' + imgH + ' — 拖动分割线调整裁剪区域';

  updateLines();
  updateLayers();
  setupComposite();
};

img.onerror = function() {
  document.getElementById('status').textContent = '加载失败，确认 Pixel scene.png 在同目录';
};

// --- Dragging ---
let dragging = null;

lines.forEach((el, i) => {
  el.addEventListener('mousedown', e => { dragging = i; e.preventDefault(); });
  el.addEventListener('touchstart', e => { dragging = i; e.preventDefault(); }, {passive:false});
});

window.addEventListener('mousemove', onDrag);
window.addEventListener('touchmove', onDrag, {passive:false});
window.addEventListener('mouseup', () => { dragging = null; });
window.addEventListener('touchend', () => { dragging = null; });

function onDrag(e) {
  if (dragging === null) return;
  e.preventDefault();
  const cutArea = document.getElementById('cutArea');
  const rect = cutArea.getBoundingClientRect();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const relY = clientY - rect.top;
  const imgY = Math.round(relY / scale);

  // Clamp: keep lines in order with min 40px gap
  const minGap = 40;
  const i = dragging;
  let newY = imgY;

  if (i === 0) {
    newY = Math.max(0, Math.min(cuts[1] - minGap, newY));
  } else if (i === 1) {
    newY = Math.max(cuts[0] + minGap, Math.min(cuts[2] - minGap, newY));
  } else if (i === 2) {
    newY = Math.max(cuts[1] + minGap, Math.min(cuts[3] - minGap, newY));
  } else {
    newY = Math.max(cuts[2] + minGap, Math.min(imgH, newY));
  }

  cuts[i] = newY;
  updateLines();
  updateLayers();
}

function updateLines() {
  lines.forEach((el, i) => {
    el.style.top = Math.floor(cuts[i] * scale) + 'px';
    // Update labels with pixel values
    const labels = [
      '远景起点 y=' + cuts[0],
      '远景终点 / 中景起点 y=' + cuts[1],
      '中景终点 / 近景起点 y=' + cuts[2],
      '近景终点 y=' + cuts[3],
    ];
    el.setAttribute('data-label', labels[i]);
  });
}

// Fade top pixels for blending
function fadeTop(ctx, w, h, fadeH) {
  if (fadeH <= 0) return;
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  for (let y = 0; y < Math.min(fadeH, h); y++) {
    const alpha = y / fadeH;
    for (let x = 0; x < w; x++) {
      const idx = (y * w + x) * 4;
      data[idx + 3] = Math.floor(data[idx + 3] * alpha);
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

function updateLayers() {
  const layerDefs = [
    { id: 'layer1', y: cuts[0], h: cuts[1] - cuts[0], fade: 0 },
    { id: 'layer2', y: cuts[1], h: cuts[2] - cuts[1], fade: 60 },
    { id: 'layer3', y: cuts[2], h: cuts[3] - cuts[2], fade: 60 },
  ];

  layerDefs.forEach(layer => {
    const canvas = document.getElementById(layer.id);
    if (layer.h <= 0) { canvas.width = 1; canvas.height = 1; return; }
    canvas.width = imgW;
    canvas.height = layer.h;

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, imgW, layer.h);
    ctx.drawImage(img, 0, layer.y, imgW, layer.h, 0, 0, imgW, layer.h);

    if (layer.fade > 0) {
      fadeTop(ctx, imgW, layer.h, layer.fade);
    }
  });
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// --- Composite parallax preview ---
function setupComposite() {
  const comp = document.getElementById('composite');
  const ctx = comp.getContext('2d');
  let mouseX = 0.5;

  comp.addEventListener('mousemove', e => {
    const rect = comp.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) / rect.width;
  });

  const speeds = [0.06, 0.18, 0.4];

  function render() {
    ctx.fillStyle = '#060d18';
    ctx.fillRect(0, 0, 896, 512);

    ['layer1','layer2','layer3'].forEach((id, i) => {
      const lc = document.getElementById(id);
      if (lc.width <= 1) return;
      const offset = (mouseX - 0.5) * 200 * speeds[i];
      // Scale layer to fill composite width, position vertically proportional to cuts
      const yRatio = cuts[i] / imgH;
      const hRatio = (cuts[i+1] - cuts[i]) / imgH;
      const drawY = yRatio * 512;
      const drawH = hRatio * 512;
      ctx.drawImage(lc, 0, 0, lc.width, lc.height, offset, drawY, 896, drawH);
    });

    requestAnimationFrame(render);
  }
  render();
}
</script>
</body>
</html>
